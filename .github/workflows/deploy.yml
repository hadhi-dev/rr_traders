name: Deploy Website to Hostinger FTP

on:
  push:
    branches:
      - main

jobs:
  web-deploy:
    name: 🚚 Deploy Website
    runs-on: ubuntu-latest
    steps:
    - name: 🚚 Get latest code
      uses: actions/checkout@v3

    - name: ⚡ Auto-inject Cache Buster Version
      run: |
        sed -i 's|assets/css/style.css[^"]*|assets/css/style.css?v=${{ github.sha }}|g' index.html
        sed -i 's|assets/js/main.js[^"]*|assets/js/main.js?v=${{ github.sha }}|g' index.html

    - name: 📂 Sync files to Hostinger FTP
      uses: SamKirkland/FTP-Deploy-Action@v4.3.4
      with:
        server: ftp://145.79.210.214
        username: u973938263.rrtraders.online
        password: ${{ secrets.FTP_PASSWORD }}
        server-dir: ./
        protocol: ftp
        port: 21
