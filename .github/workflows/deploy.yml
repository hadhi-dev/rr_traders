name: Deploy Website to Hostinger FTP

on:
  push:
    branches:
      - main

jobs:
  web-deploy:
    name: 🚚 Deploy Website
    runs-on: ubuntu-latest
    steps:
    - name: 🚚 Get latest code
      uses: actions/checkout@v3

    - name: ⚡ Auto-inject Cache Buster Version
      run: |
        sed -i 's|assets/css/style.css[^"]*|assets/css/style.css?v=${{ github.sha }}|g' index.html
        sed -i 's|assets/js/main.js[^"]*|assets/js/main.js?v=${{ github.sha }}|g' index.html

    - name: 📂 Sync files to Hostinger FTP (via lftp)
      run: |
        sudo apt-get update && sudo apt-get install -y lftp
        lftp -c "set ftp:ssl-allow false; set ftp:passive-mode true; open -u u973938263.rrtraders.online,\"${{ secrets.FTP_PASSWORD }}\" -p 21 145.79.210.214; mirror -R --delete --parallel=10 --exclude-glob .git* --exclude-glob .github* --exclude-glob README.md ./ ./"
